name: Build NyaKernel (SukiSU + SUSFS)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  KERNEL_PATH: kernel
  CLANG_PATH: clang
  GCC64_PATH: gcc64
  DEFCONFIG_NAME: apollo_stock_defconfig

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repo (patches, workflow)
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sm8250
          ref: lineage-23.2
          path: ${{ env.KERNEL_PATH }}
          fetch-depth: 1

      - name: Add missing min-tool-version.sh
        run: |
          cat > $KERNEL_PATH/scripts/min-tool-version.sh << 'EOF'
          #!/bin/sh
          # SPDX-License-Identifier: GPL-2.0-only
          set -e
          if [ $# != 1 ]; then
            echo "Usage: $0 toolname" >&2
            exit 1
          fi
          case "$1" in
          binutils)
            echo 2.23.0
            ;;
          gcc)
            echo 4.9.0
            ;;
          llvm)
            echo 10.0.0
            ;;
          *)
            echo "$1: unknown tool" >&2
            exit 1
            ;;
          esac
          EOF
          chmod +x $KERNEL_PATH/scripts/min-tool-version.sh

      - name: Apply Kbuild patches
        run: |
          patch -p1 -d $KERNEL_PATH < \
            patches/qcacld-3.0/0001-Kbuild-add-unconditional-CE-include-path.patch

      - name: Inject SukiSU-Ultra source
        run: |
          cd $KERNEL_PATH
          DRIVER_DIR="drivers"
          # Clone SukiSU and checkout f4863b20
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra KernelSU
          cd KernelSU
          git fetch --depth=1 origin f4863b20cc8dc0f8cc67418980f022e43014b598
          git checkout f4863b20cc8dc0f8cc67418980f022e43014b598
          cd ..
          ln -sf "$(realpath --relative-to="$DRIVER_DIR" "$PWD/KernelSU/kernel")" "$DRIVER_DIR/kernelsu"
          grep -q "kernelsu" "$DRIVER_DIR/Makefile" || \
            printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_DIR/Makefile"
          grep -q "source \"drivers/kernelsu/Kconfig\"" "$DRIVER_DIR/Kconfig" || \
            sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" "$DRIVER_DIR/Kconfig"
          echo "SukiSU f4863b20 injected"

      - name: Integrate SUSFS source (kernel-4.19)
        run: |
          cd $KERNEL_PATH
          git clone --depth=1 --branch kernel-4.19 \
            https://gitlab.com/simonpunk/susfs4ksu susfs4ksu

          # Copy SUSFS source files (new files, always works)
          cp susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp susfs4ksu/kernel_patches/fs/sus_su.c fs/
          cp susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          cp susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/
          cp susfs4ksu/kernel_patches/include/linux/sus_su.h include/linux/

          # Add susfs.o and sus_su.o to fs/Makefile
          grep -q "susfs" fs/Makefile || \
            printf "\nobj-\$(CONFIG_KSU_SUSFS) += susfs.o\nobj-\$(CONFIG_KSU_SUSFS) += sus_su.o\n" >> fs/Makefile

          # Apply all-in-one SUSFS patch for our LineageOS 4.19 kernel
          # Generated from local kernel after testing all hunks
          # Known rejects: netfilter headers and tools/ (cosmetic, no impact)
          patch -p1 -F3 < $GITHUB_WORKSPACE/patches/susfs-all-in-one.patch \
            || echo "WARNING: some hunks rejected (netfilter/tools only, safe to ignore)"

          # Make ksu_ksud_init() unconditional (f4863b20 lacks CONFIG_KSU_KPROBES_HOOK)
          # Without this, manager cannot communicate with kernel
          patch -p1 -F3 < $GITHUB_WORKSPACE/patches/susfs-ksud-fix.patch \
            || echo "WARNING: ksud fix patch failed"

          rm -rf susfs4ksu
          echo "SUSFS kernel-4.19 integrated"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev

      - name: Generate merged defconfig
        run: |
          cd $KERNEL_PATH
          make ARCH=arm64 O=out vendor/kona-perf_defconfig

          # Use -m (merge only) to avoid alldefconfig dropping options
          scripts/kconfig/merge_config.sh -m -O out out/.config \
            arch/arm64/configs/vendor/debugfs.config \
            arch/arm64/configs/vendor/xiaomi/sm8250-common.config \
            arch/arm64/configs/vendor/xiaomi/apollo.config

          # Force options NOT present in any config file but needed here
          echo ">>> Setting extra options..."
          for opt in \
            CONFIG_CNSS2=y \
            CONFIG_CNSS2_QMI=y \
            CONFIG_KPROBES=y \
            CONFIG_KSU=y \
            CONFIG_KSU_MANUAL_HOOK=y \
            CONFIG_KSU_SUSFS=y \
            CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y \
            CONFIG_KSU_SUSFS_SUS_MOUNT=y \
            CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y \
            CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y \
            CONFIG_KSU_SUSFS_SUS_KSTAT=y \
            CONFIG_KSU_SUSFS_TRY_UMOUNT=y \
            CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y \
            CONFIG_KSU_SUSFS_SPOOF_UNAME=y \
            CONFIG_KSU_SUSFS_ENABLE_LOG=y \
            CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y \
            CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y \
            CONFIG_KPM=y; do
            name="${opt%=*}"
            sed -i "/^$name=/d; /^# $name is not set/d" out/.config
            echo "$opt" >> out/.config
          done
          # Explicitly disable problematic SUSFS options
          for opt in \
            CONFIG_KSU_SUSFS_SUS_PATH=n \
            CONFIG_KSU_SUSFS_SUS_OVERLAYFS=n \
            CONFIG_KSU_SUSFS_OPEN_REDIRECT=n \
            CONFIG_KSU_SUSFS_SUS_SU=n; do
            name="${opt%=*}"
            sed -i "/^$name=/d; /^# $name is not set/d" out/.config
            echo "# $name is not set" >> out/.config
          done

          # Custom LOCALVERSION with feature field
          SHORT_HASH=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y%m%d)
          sed -i "/^CONFIG_LOCALVERSION=/d; /^# CONFIG_LOCALVERSION is not set/d" out/.config
          echo "CONFIG_LOCALVERSION=\"-NyaKernel-sukisu_susfs-${BUILD_DATE}-g${SHORT_HASH}\"" >> out/.config
          # Disable auto versioning
          sed -i "/^CONFIG_LOCALVERSION_AUTO=/d; /^# CONFIG_LOCALVERSION_AUTO is not set/d" out/.config
          echo "CONFIG_LOCALVERSION_AUTO=n" >> out/.config

          # Remove CONFIG_CC_WERROR
          sed -i "/^CONFIG_CC_WERROR=/d; /^# CONFIG_CC_WERROR is not set/d" out/.config
          echo "# CONFIG_CC_WERROR is not set" >> out/.config

          # Resolve dependencies
          make ARCH=arm64 O=out olddefconfig

          # === Diagnostic: dump KSU/SUSFS config values ===
          echo "=== Config values after olddefconfig ==="
          for opt in \
            CONFIG_KSU CONFIG_KSU_MANUAL_HOOK CONFIG_KSU_SUSFS CONFIG_KPM \
            CONFIG_CNSS2 CONFIG_CNSS2_QMI \
            CONFIG_LTO_CLANG CONFIG_CFI_CLANG CONFIG_SHADOW_CALL_STACK \
            CONFIG_ARCH_QCOM CONFIG_DRM_MSM CONFIG_QCOM_SMEM \
            CONFIG_CRYPTO_DEV_QCOM_ICE CONFIG_QCOM_QMI_HELPERS \
            CONFIG_QPNP_SMB5 CONFIG_USB_DWC3_MSM \
            CONFIG_MSM_BT_POWER CONFIG_MMC_SDHCI_MSM \
            CONFIG_HWSPINLOCK CONFIG_QRTR CONFIG_MFD_SPMI_PMIC \
            CONFIG_BLK_DEV_DM CONFIG_USB_DWC3 CONFIG_MMC \
            CONFIG_MMC_SDHCI CONFIG_MMC_SDHCI_PLTFM CONFIG_DRM \
            CONFIG_PINCTRL_KONA CONFIG_PINCTRL_MSM; do
            grep -E "^$opt[= ]" out/.config || echo "  $opt: NOT IN .CONFIG"
          done

          # Save the final config
          cp out/.config arch/arm64/configs/$DEFCONFIG_NAME
          rm -rf out

      - name: Cache toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CLANG_PATH }}
            ${{ env.GCC64_PATH }}
          key: toolchains-apollo-${{ runner.os }}

      - name: Download AOSP Clang r383902
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          echo "::group::Cloning AOSP Clang r383902"
          git clone --depth=1 --branch android12-release \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            $CLANG_PATH
          echo "::endgroup::"

      - name: Download AOSP GCC 4.9 (aarch64)
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          echo "::group::Cloning AOSP GCC 4.9"
          git clone --depth=1 --branch android12-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            $GCC64_PATH
          echo "::endgroup::"

      - name: Build kernel
        run: |
          export ROOT_DIR=$(pwd)
          export PATH=$ROOT_DIR/$CLANG_PATH/clang-r383902/bin:$ROOT_DIR/$GCC64_PATH/bin:$PATH
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          cd $KERNEL_PATH

          # Generate .config from our merged defconfig
          mkdir -p out
          cp arch/arm64/configs/$DEFCONFIG_NAME out/.config
          make O=out ARCH=$ARCH CC=$CC \
            CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE \
            olddefconfig

          # Pre-build diagnostic: dump KSU config values
          echo "=== Pre-build .config values ==="
          for opt in \
            CONFIG_KSU CONFIG_KPROBES \
            CONFIG_ARCH_QCOM CONFIG_DRM_MSM CONFIG_QCOM_SMEM \
            CONFIG_CRYPTO_DEV_QCOM_ICE CONFIG_QCOM_QMI_HELPERS \
            CONFIG_QPNP_SMB5 CONFIG_USB_DWC3_MSM \
            CONFIG_MSM_BT_POWER CONFIG_MMC_SDHCI_MSM \
            CONFIG_HWSPINLOCK CONFIG_QRTR CONFIG_MFD_SPMI_PMIC \
            CONFIG_BLK_DEV_DM CONFIG_USB_DWC3 CONFIG_MMC \
            CONFIG_MMC_SDHCI CONFIG_MMC_SDHCI_PLTFM CONFIG_DRM \
            CONFIG_CNSS2 CONFIG_CNSS CONFIG_CNSS2_QMI \
            CONFIG_ARCH_KONA; do
            grep -E "^$opt[= ]" out/.config || echo "  $opt: NOT IN .CONFIG"
          done

          # Final config verification
          echo "=== Pre-build config check ==="
          for opt in \
            CONFIG_ARCH_QCOM=y CONFIG_IPC_LOGGING=y CONFIG_PCI_MSM=y \
            CONFIG_MHI_BUS=y CONFIG_MHI_QCOM=y \
            CONFIG_COMPAT=y CONFIG_ARM64_4K_PAGES=y \
            CONFIG_QCOM_SMEM=y \
            CONFIG_CRYPTO_DEV_QCOM_ICE=y CONFIG_QCOM_QMI_HELPERS=y \
            CONFIG_QPNP_SMB5=y CONFIG_USB_DWC3_MSM=y \
            CONFIG_MSM_BT_POWER=y CONFIG_MMC_SDHCI_MSM=y \
            CONFIG_CNSS2=y CONFIG_CNSS2_QMI=y \
            CONFIG_ARCH_KONA=y \
            CONFIG_KPROBES=y CONFIG_KSU=y CONFIG_KPM=y; do
            name="${opt%=*}"
            if ! grep -q "$opt" out/.config; then
              echo "WARNING: $name is not set (value should be $opt) — may cause build failure"
              grep "^$name\|$name is not set" out/.config || echo "(not found at all)"
            fi
          done
          echo "Config check complete."

          echo "=== Starting kernel build ==="
          make -j$(nproc) O=out ARCH=$ARCH CC=$CC \
            CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE

      - name: Inject KernelPatch (KPM)
        run: |
          IMAGE=$KERNEL_PATH/out/arch/arm64/boot/Image
          if [ ! -f "$IMAGE" ]; then
            echo "FATAL: Image not found at $IMAGE"
            exit 1
          fi
          # patch_linux works in its own CWD, cd to the Image directory like reference
          cd "$(dirname "$IMAGE")"
          wget -q https://github.com/SukiSU-Ultra/SukiSU_KernelPatch_patch/releases/download/0.12.0/patch_linux
          chmod +x patch_linux
          cp Image Image.orig
          ./patch_linux
          if [ -f oImage ]; then
            mv oImage Image
            echo "KernelPatch injected successfully"
          else
            echo "WARNING: patch_linux did not produce oImage, using original"
          fi

      - name: Set artifact naming
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y%m%d)
          echo "KERNEL_BASE=NyaKernel-apollo-sukisu_susfs-${SHORT_HASH}-${BUILD_DATE}" >> "$GITHUB_ENV"

      - name: Package AnyKernel3
        run: |
          echo "::group::Packaging AnyKernel3"
          IMAGE=$KERNEL_PATH/out/arch/arm64/boot/Image
          if [ ! -f "$IMAGE" ]; then
            echo "FATAL: Image not found at $IMAGE"
            exit 1
          fi

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp "$IMAGE" anykernel/
          # Handle dtb
          if [ -f "$KERNEL_PATH/out/arch/arm64/boot/dtb" ]; then
            cp "$KERNEL_PATH/out/arch/arm64/boot/dtb" anykernel/dtb
          elif [ -d "$KERNEL_PATH/out/arch/arm64/boot/dts" ]; then
            find "$KERNEL_PATH/out/arch/arm64/boot/dts" -name '*.dtb' -exec cat {} + > anykernel/dtb
          fi
          # Handle dtbo if present
          if [ -f "$KERNEL_PATH/out/arch/arm64/boot/dtbo.img" ]; then
            cp "$KERNEL_PATH/out/arch/arm64/boot/dtbo.img" anykernel/
          fi
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          zip -r9 "../${KERNEL_BASE}-AnyKernel3.zip" * -x ".git/*" README.md
          cd ..
          echo "::endgroup::"

      - name: Package boot.img
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/system/tools/mkbootimg \
            mkbootimg-tools
          curl -f -L -o stock-boot.img \
            "https://mirror.math.princeton.edu/pub/lineageos/full/apollon/20260530/boot.img"

          DTB=$KERNEL_PATH/out/arch/arm64/boot/dtb
          [ -f "$DTB" ] || DTB="none"
          python3 scripts/repack_bootimg.py \
            stock-boot.img \
            $KERNEL_PATH/out/arch/arm64/boot/Image \
            "$DTB" \
            "${KERNEL_BASE}-boot.img"

      - name: Upload AnyKernel3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_BASE }}-AnyKernel3
          path: ${{ env.KERNEL_BASE }}-AnyKernel3.zip

      - name: Upload boot.img artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_BASE }}-bootimg
          path: ${{ env.KERNEL_BASE }}-boot.img

      - name: Generate release body
        id: release-info
        run: |
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          python3 scripts/generate_release_body.py release_body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: NyaKernel-sukisu_susfs-${{ github.run_number }}
          name: "NyaKernel (apollo, SukiSU+SUSFS) #${{ github.run_number }} (${{ steps.release-info.outputs.date }})"
          body_path: release_body.md
          files: |
            ${{ env.KERNEL_BASE }}-AnyKernel3.zip
            ${{ env.KERNEL_BASE }}-boot.img
          fail_on_unmatched_files: false
