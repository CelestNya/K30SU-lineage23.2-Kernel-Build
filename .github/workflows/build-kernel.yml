name: Build Stock Kernel (apollo)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  KERNEL_PATH: kernel
  CLANG_PATH: clang
  GCC64_PATH: gcc64
  DEFCONFIG_NAME: apollo_stock_defconfig

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repo (patches, workflow)
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sm8250
          ref: lineage-23.2
          path: ${{ env.KERNEL_PATH }}
          fetch-depth: 1

      - name: Add missing min-tool-version.sh
        run: |
          cat > $KERNEL_PATH/scripts/min-tool-version.sh << 'EOF'
          #!/bin/sh
          # SPDX-License-Identifier: GPL-2.0-only
          set -e
          if [ $# != 1 ]; then
            echo "Usage: $0 toolname" >&2
            exit 1
          fi
          case "$1" in
          binutils)
            echo 2.23.0
            ;;
          gcc)
            echo 4.9.0
            ;;
          llvm)
            echo 10.0.0
            ;;
          *)
            echo "$1: unknown tool" >&2
            exit 1
            ;;
          esac
          EOF
          chmod +x $KERNEL_PATH/scripts/min-tool-version.sh

      - name: Apply Kbuild patches
        run: |
          patch -p1 -d $KERNEL_PATH < \
            patches/qcacld-3.0/0001-Kbuild-add-unconditional-CE-include-path.patch

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev

      - name: Generate merged defconfig
        run: |
          cd $KERNEL_PATH
          make ARCH=arm64 O=out vendor/kona-perf_defconfig
          scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/debugfs.config \
            arch/arm64/configs/vendor/xiaomi/sm8250-common.config \
            arch/arm64/configs/vendor/xiaomi/apollo.config

          # === Force all required options ===
          # Some options in kona-perf_defconfig may be silently dropped during
          # merge_config / olddefconfig if their dependency chain is broken.
          # Unconditionally force all symbol-providing options + their deps.
          echo ">>> Unconditionally setting critical options..."
          for opt in \
            CONFIG_ARCH_QCOM=y \
            CONFIG_IPC_LOGGING=y \
            CONFIG_PCI_MSM=y \
            CONFIG_MHI_BUS=y \
            CONFIG_MHI_QCOM=y \
            CONFIG_COMPAT=y \
            CONFIG_ARM64_4K_PAGES=y \
            CONFIG_DRM_MSM=y \
            CONFIG_QCOM_SMEM=y \
            CONFIG_CRYPTO_DEV_QCOM_ICE=y \
            CONFIG_QCOM_QMI_HELPERS=y \
            CONFIG_QPNP_SMB5=y \
            CONFIG_USB_DWC3_MSM=y \
            CONFIG_MSM_BT_POWER=y \
            CONFIG_MMC_SDHCI_MSM=y \
            CONFIG_HWSPINLOCK=y \
            CONFIG_QRTR=y \
            CONFIG_MFD_SPMI_PMIC=y \
            CONFIG_BLK_DEV_DM=y \
            CONFIG_USB_DWC3=y \
            CONFIG_MMC=y \
            CONFIG_MMC_SDHCI=y \
            CONFIG_MMC_SDHCI_PLTFM=y \
            CONFIG_DRM=y \
            CONFIG_CNSS2=y \
            CONFIG_LTO_CLANG=y \
            CONFIG_CFI_CLANG=y \
            CONFIG_SHADOW_CALL_STACK=y; do
            name="${opt%=*}"
            # Remove any existing setting, then append our value
            sed -i "/^$name=/d; /^# $name is not set/d" out/.config
            echo "$opt" >> out/.config
          done

          # Remove CONFIG_CC_WERROR â€” cleaner than KCFLAGS=-Wno-error
          sed -i "/^CONFIG_CC_WERROR=/d; /^# CONFIG_CC_WERROR is not set/d" out/.config
          echo "# CONFIG_CC_WERROR is not set" >> out/.config

          # Resolve dependencies after our forced changes
          make ARCH=arm64 O=out olddefconfig

          # === Diagnostic: dump exact value for each critical option ===
          echo "=== Config values after olddefconfig ==="
          for opt in \
            CONFIG_ARCH_QCOM CONFIG_IPC_LOGGING CONFIG_PCI_MSM \
            CONFIG_MHI_BUS CONFIG_MHI_QCOM \
            CONFIG_COMPAT CONFIG_ARM64_4K_PAGES \
            CONFIG_LTO_CLANG CONFIG_CFI_CLANG CONFIG_SHADOW_CALL_STACK \
            CONFIG_CC_WERROR \
            CONFIG_CNSS2 CONFIG_CNSS \
            CONFIG_DRM_MSM CONFIG_QCOM_SMEM CONFIG_CRYPTO_DEV_QCOM_ICE \
            CONFIG_QCOM_QMI_HELPERS CONFIG_QPNP_SMB5 \
            CONFIG_MSM_BT_POWER CONFIG_MMC_SDHCI_MSM CONFIG_USB_DWC3_MSM \
            CONFIG_HWSPINLOCK CONFIG_QRTR CONFIG_MFD_SPMI_PMIC \
            CONFIG_BLK_DEV_DM CONFIG_USB_DWC3 CONFIG_MMC \
            CONFIG_MMC_SDHCI CONFIG_MMC_SDHCI_PLTFM CONFIG_DRM \
            CONFIG_PINCTRL_KONA CONFIG_PINCTRL_MSM \
            CONFIG_ICNSS CONFIG_ICNSS2 CONFIG_CNSS2; do
            result="$(grep "^$opt\b" out/.config)"
            if [ -n "$result" ]; then
              echo "  $result"
            else
              echo "  $opt: NOT IN .CONFIG"
            fi
          done

          # Save the final config
          cp out/.config arch/arm64/configs/$DEFCONFIG_NAME
          rm -rf out

      - name: Cache toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CLANG_PATH }}
            ${{ env.GCC64_PATH }}
          key: toolchains-apollo-${{ runner.os }}

      - name: Download AOSP Clang r383902
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          echo "::group::Cloning AOSP Clang r383902"
          git clone --depth=1 --branch android12-release \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            $CLANG_PATH
          echo "::endgroup::"

      - name: Download AOSP GCC 4.9 (aarch64)
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          echo "::group::Cloning AOSP GCC 4.9"
          git clone --depth=1 --branch android12-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            $GCC64_PATH
          echo "::endgroup::"

      - name: Build kernel
        run: |
          export ROOT_DIR=$(pwd)
          export PATH=$ROOT_DIR/$CLANG_PATH/clang-r383902/bin:$ROOT_DIR/$GCC64_PATH/bin:$PATH
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          cd $KERNEL_PATH

          # Generate .config from our merged defconfig
          mkdir -p out
          cp arch/arm64/configs/$DEFCONFIG_NAME out/.config
          make O=out ARCH=$ARCH CC=$CC \
            CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE \
            olddefconfig

          # Pre-build diagnostic: dump actual values
          echo "=== Pre-build .config values ==="
          for opt in \
            CONFIG_ARCH_QCOM CONFIG_DRM_MSM CONFIG_QCOM_SMEM \
            CONFIG_CRYPTO_DEV_QCOM_ICE CONFIG_QCOM_QMI_HELPERS \
            CONFIG_QPNP_SMB5 CONFIG_USB_DWC3_MSM \
            CONFIG_MSM_BT_POWER CONFIG_MMC_SDHCI_MSM \
            CONFIG_HWSPINLOCK CONFIG_QRTR CONFIG_MFD_SPMI_PMIC \
            CONFIG_BLK_DEV_DM CONFIG_USB_DWC3 CONFIG_MMC \
            CONFIG_MMC_SDHCI CONFIG_MMC_SDHCI_PLTFM CONFIG_DRM \
            CONFIG_CNSS2 CONFIG_CNSS; do
            result="$(grep "^$opt\b" out/.config)"
            if [ -n "$result" ]; then
              echo "  $result"
            else
              echo "  $opt: NOT IN .CONFIG"
            fi
          done

          # Final config verification before full build
          echo "=== Pre-build config check ==="
          for opt in \
            CONFIG_ARCH_QCOM=y CONFIG_IPC_LOGGING=y CONFIG_PCI_MSM=y \
            CONFIG_MHI_BUS=y CONFIG_MHI_QCOM=y \
            CONFIG_COMPAT=y CONFIG_ARM64_4K_PAGES=y \
            CONFIG_DRM_MSM=y CONFIG_QCOM_SMEM=y \
            CONFIG_CRYPTO_DEV_QCOM_ICE=y CONFIG_QCOM_QMI_HELPERS=y \
            CONFIG_QPNP_SMB5=y CONFIG_USB_DWC3_MSM=y \
            CONFIG_MSM_BT_POWER=y CONFIG_MMC_SDHCI_MSM=y \
            CONFIG_CNSS2=y; do
            name="${opt%=*}"
            if ! grep -q "$opt" out/.config; then
              echo "FATAL: $name is not set (value should be $opt)"
              grep "^$name\|$name is not set" out/.config || echo "(not found at all)"
              exit 1
            fi
          done
          echo "All critical options verified OK."

          echo "=== Starting kernel build ==="
          make -j$(nproc) O=out ARCH=$ARCH CC=$CC \
            CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE

      - name: Package AnyKernel3
        run: |
          echo "::group::Packaging AnyKernel3"
          IMAGE=$KERNEL_PATH/out/arch/arm64/boot/Image
          if [ ! -f "$IMAGE" ]; then
            echo "FATAL: Image not found at $IMAGE"
            exit 1
          fi

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp "$IMAGE" anykernel/
          # Handle dtb â€” concatenated or individual
          if [ -f "$KERNEL_PATH/out/arch/arm64/boot/dtb" ]; then
            cp "$KERNEL_PATH/out/arch/arm64/boot/dtb" anykernel/dtb
          elif [ -d "$KERNEL_PATH/out/arch/arm64/boot/dts" ]; then
            find "$KERNEL_PATH/out/arch/arm64/boot/dts" -name '*.dtb' -exec cat {} + > anykernel/dtb
          fi
          # Handle dtbo if present
          if [ -f "$KERNEL_PATH/out/arch/arm64/boot/dtbo.img" ]; then
            cp "$KERNEL_PATH/out/arch/arm64/boot/dtbo.img" anykernel/
          fi
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          zip -r9 ../kernel-apollo-stock.zip * -x ".git/*" README.md
          cd ..
          echo "::endgroup::"

      - name: Upload kernel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-apollo-stock
          path: kernel-apollo-stock.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stock-kernel-${{ github.run_number }}
          name: "Stock Kernel (apollo) build #${{ github.run_number }}"
          body: |
            Stock kernel for Redmi K30S Ultra (apollo/apolloin).

            - **Source**: LineageOS/android_kernel_xiaomi_sm8250 @ lineage-23.2
            - **Toolchain**: AOSP Clang r383902 (Clang 14) + GCC 4.9
            - **Config**: vendor/kona-perf + debugfs + sm8250-common + apollo
            - **Packaged**: AnyKernel3
          files: kernel-apollo-stock.zip
          fail_on_unmatched_files: false
