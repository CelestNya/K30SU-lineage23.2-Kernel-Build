name: Build Stock Kernel (apollo)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sm8250
          ref: lineage-23.2
          path: kernel
          fetch-depth: 1

      - name: Add missing min-tool-version.sh
        run: |
          cat > kernel/scripts/min-tool-version.sh << 'EOF'
          #!/bin/sh
          # SPDX-License-Identifier: GPL-2.0-only
          set -e
          if [ $# != 1 ]; then
            echo "Usage: $0 toolname" >&2
            exit 1
          fi
          case "$1" in
          binutils)
            echo 2.23.0
            ;;
          gcc)
            echo 4.9.0
            ;;
          llvm)
            echo 10.0.0
            ;;
          *)
            echo "$1: unknown tool" >&2
            exit 1
            ;;
          esac
          EOF
          chmod +x kernel/scripts/min-tool-version.sh

      - name: Patch kernel source for Clang compatibility
        run: |
          # filter.h uses compat_uptr_t but doesn't include linux/compat.h
          sed -i '/^#include <linux\/sockptr.h>/a #include <linux/compat.h>' kernel/include/linux/filter.h

      - name: Generate merged defconfig
        run: |
          cd kernel
          make ARCH=arm64 O=out vendor/kona-perf_defconfig
          scripts/kconfig/merge_config.sh -O out out/.config \
            arch/arm64/configs/vendor/debugfs.config \
            arch/arm64/configs/vendor/xiaomi/sm8250-common.config \
            arch/arm64/configs/vendor/xiaomi/apollo.config
          cp out/.config arch/arm64/configs/apollo_stock_defconfig
          rm -rf out

      - name: Build kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: ./kernel/
          config: apollo_stock_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          android-version: 12
          aosp-clang-version: r383902
          extra-make-args: '["KCFLAGS=-Wno-error"]'
          anykernel3: true
          release: true
