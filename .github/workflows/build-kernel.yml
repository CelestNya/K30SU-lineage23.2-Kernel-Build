name: Build ReSukiSU + SUSFS Kernel (apollo)

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  KERNEL_PATH: kernel
  CLANG_PATH: clang
  GCC64_PATH: gcc64
  DEFCONFIG_NAME: apollo_stock_defconfig
  KSU_PATH: KernelSU
  SUSFS_PATH: susfs

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repo (patches, workflow)
        uses: actions/checkout@v4

      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_sm8250
          ref: lineage-23.2
          path: ${{ env.KERNEL_PATH }}
          fetch-depth: 1

      - name: Checkout ReSukiSU (SukiSU-Ultra)
        uses: actions/checkout@v4
        with:
          repository: SukiSU-Ultra/SukiSU-Ultra
          ref: main
          path: ${{ env.KSU_PATH }}
          fetch-depth: 1

      - name: Checkout SUSFS
        uses: actions/checkout@v4
        with:
          repository: simonpunk/susfs4ksu
          ref: main
          path: ${{ env.SUSFS_PATH }}
          fetch-depth: 1

      - name: Add missing min-tool-version.sh
        run: |\
          cat > $KERNEL_PATH/scripts/min-tool-version.sh << 'EOF'
          #!/bin/sh
          # SPDX-License-Identifier: GPL-2.0-only
          set -e
          if [ $# != 1 ]; then
            echo "Usage: $0 toolname" >&2
            exit 1
          fi
          case "$1" in
          binutils)
            echo 2.23.0
            ;;
          gcc)
            echo 4.9.0
            ;;
          llvm)
            echo 10.0.0
            ;;
          *)
            echo "$1: unknown tool" >&2
            exit 1
            ;;
          esac
          EOF
          chmod +x $KERNEL_PATH/scripts/min-tool-version.sh

      - name: Apply KernelSU to kernel source
        run: |
          echo "::group::Integrating KernelSU into kernel source"
          cd $KERNEL_PATH
          
          # Copy KernelSU kernel module sources
          cp -rf ../${{ env.KSU_PATH }}/kernel .
          
          # Create Kbuild file for KernelSU
          cat > kernel/Kbuild << 'KSBUILD'
ccflags-y := -Wno-implicit-function-declaration -Wno-strict-prototypes -Wno-int-conversion -Wno-gcc-compat
ccflags-y += -DKSU_VERSION=65536

obj-y += main.o
obj-y += ksu.o
obj-y += allowlist.o
obj-y += sucompat.o
obj-y += ksud.o
obj-y += debugfs.o
obj-y += selinux/selinux.o
obj-y += selinux/ksu_hook.o
obj-y += selinux/rules.o
obj-y += arch/$(ARCH)/hook.o
KSBUILD
          
          # Add KernelSU to kernel Makefile
          if ! grep -q "obj-\$(CONFIG_KSU)" Makefile; then
            echo 'obj-$(CONFIG_KSU) += kernel/' >> Makefile
          fi
          echo "::endgroup::"

      - name: Apply SUSFS patches
        run: |
          echo "::group::Applying SUSFS patches"
          cd $KERNEL_PATH
          
          # Copy SUSFS patch files
          cp -rf ../${{ env.SUSFS_PATH }}/patches .
          
          # Apply SUSFS patches for kernel 4.19/sm8250
          # Note: May need to adjust patch paths based on actual structure
          if [ -d patches/kernel_patches ]; then
            for patch in patches/kernel_patches/*.patch; do
              if [ -f "$patch" ]; then
                echo "Applying: $patch"
                patch -p1 < "$patch" || echo "Warning: Patch $patch failed, continuing..."
              fi
            done
          fi
          echo "::endgroup::"

      - name: Apply Kbuild patches
        run: |
          patch -p1 -d $KERNEL_PATH < \
            patches/qcacld-3.0/0001-Kbuild-add-unconditional-CE-include-path.patch

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison flex libssl-dev libelf-dev

      - name: Generate merged defconfig
        run: |
          cd $KERNEL_PATH
          make ARCH=arm64 O=out vendor/kona-perf_defconfig

          # Use -m (merge only) to avoid alldefconfig dropping options from
          # the base .config that aren't explicitly in any fragment.
          # olddefconfig then resolves dependencies while preserving everything.
          scripts/kconfig/merge_config.sh -m -O out out/.config \
            arch/arm64/configs/vendor/debugfs.config \
            arch/arm64/configs/vendor/xiaomi/sm8250-common.config \
            arch/arm64/configs/vendor/xiaomi/apollo.config

          # Force options NOT present in any config file but needed here
          echo ">>> Setting extra options..."
          for opt in \
            CONFIG_CNSS2=y \
            CONFIG_CNSS2_QMI=y; do
            name="${opt%=*}"
            sed -i "/^$name=/d; /^# $name is not set/d" out/.config
            echo "$opt" >> out/.config
          done

          # === Enable KernelSU and SUSFS ===
          echo ">>> Enabling KernelSU and SUSFS options..."
          
          # Core KernelSU options
          for opt in \
            CONFIG_KSU=y \
            CONFIG_KSU_DEBUG=n \
            CONFIG_KSU_EXPECTED_SIZE=0x0 \
            CONFIG_KSU_EXPECTED_SIZE_HASH=""; do
            name="${opt%=*}"
            sed -i "/^$name=/d; /^# $name is not set/d" out/.config
            echo "$opt" >> out/.config
          done
          
          # SUSFS options (if available in kernel)
          for opt in \
            CONFIG_KSU_SUSFS=y \
            CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y \
            CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT=n \
            CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_UNAME_DEFAULT=n \
            CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTARGS=y \
            CONFIG_KSU_SUSFS_SPOOF_BOOTCONFIG=y \
            CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y \
            CONFIG_KSU_SUSFS_TRY_TO_UMOUNT_LAST_LOG=y \
            CONFIG_KSU_SUSFS_ENABLE_LOG=y \
            CONFIG_KSU_SUSFS_OPEN_REDIRECT=y \
            CONFIG_KSU_SUSFS_PATH_REDIRECT=y \
            CONFIG_KSU_SUSFS_STAT_OVERRIDE=y \
            CONFIG_KSU_SUSFS_READ_XATTR_OVERRIDE=y \
            CONFIG_KSU_SUSFS_OVERRIDE_FACCESSAT_MODE=y \
            CONFIG_KSU_SUSFS_REPORT_EPERM_AS_ENOENT=y; do
            name="${opt%=*}"
            sed -i "/^$name=/d; /^# $name is not set/d" out/.config
            echo "$opt" >> out/.config
          done

          # Custom LOCALVERSION: CelestNya-YYYYMMDD-g<commit>
          SHORT_HASH=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y%m%d)
          sed -i "/^CONFIG_LOCALVERSION=/d; /^# CONFIG_LOCALVERSION is not set/d" out/.config
          echo "CONFIG_LOCALVERSION=\"-NyaKernel-ReSukiSU-${BUILD_DATE}-g${SHORT_HASH}\"" >> out/.config
          # Disable auto versioning to avoid -dirty and duplicate -gXXXXXX
          sed -i "/^CONFIG_LOCALVERSION_AUTO=/d; /^# CONFIG_LOCALVERSION_AUTO is not set/d" out/.config
          echo "CONFIG_LOCALVERSION_AUTO=n" >> out/.config

          # Remove CONFIG_CC_WERROR — cleaner than KCFLAGS=-Wno-error
          sed -i "/^CONFIG_CC_WERROR=/d; /^# CONFIG_CC_WERROR is not set/d" out/.config
          echo "# CONFIG_CC_WERROR is not set" >> out/.config

          # Resolve dependencies (preserves existing options, unlike alldefconfig)
          make ARCH=arm64 O=out olddefconfig

          # === Diagnostic: dump exact value for each critical option ===
          echo "=== Config values after olddefconfig ==="
          for opt in \
            CONFIG_ARCH_QCOM CONFIG_ARCH_KONA CONFIG_IPC_LOGGING \
            CONFIG_PCI_MSM CONFIG_MHI_BUS CONFIG_MHI_QCOM \
            CONFIG_COMPAT CONFIG_ARM64_4K_PAGES \
            CONFIG_LTO_CLANG CONFIG_CFI_CLANG CONFIG_SHADOW_CALL_STACK \
            CONFIG_CC_WERROR \
            CONFIG_CNSS2 CONFIG_CNSS CONFIG_CNSS2_QMI \
            CONFIG_DRM_MSM CONFIG_QCOM_SMEM CONFIG_CRYPTO_DEV_QCOM_ICE \
            CONFIG_QCOM_QMI_HELPERS CONFIG_QPNP_SMB5 \
            CONFIG_USB_DWC3_MSM CONFIG_MSM_BT_POWER CONFIG_MMC_SDHCI_MSM \
            CONFIG_HWSPINLOCK CONFIG_QRTR CONFIG_MFD_SPMI_PMIC \
            CONFIG_BLK_DEV_DM CONFIG_USB_DWC3 CONFIG_MMC \
            CONFIG_MMC_SDHCI CONFIG_MMC_SDHCI_PLTFM CONFIG_DRM \
            CONFIG_PINCTRL_KONA CONFIG_PINCTRL_MSM \
            CONFIG_KSU CONFIG_KSU_SUSFS; do
            grep -E "^$opt[= ]" out/.config || echo "  $opt: NOT IN .CONFIG"
          done

          # Save the final config
          cp out/.config arch/arm64/configs/$DEFCONFIG_NAME
          rm -rf out

      - name: Cache toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CLANG_PATH }}
            ${{ env.GCC64_PATH }}
          key: toolchains-apollo-${{ runner.os }}

      - name: Download AOSP Clang r383902
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          echo "::group::Cloning AOSP Clang r383902"
          git clone --depth=1 --branch android12-release \
            https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
            $CLANG_PATH
          echo "::endgroup::"

      - name: Download AOSP GCC 4.9 (aarch64)
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          echo "::group::Cloning AOSP GCC 4.9"
          git clone --depth=1 --branch android12-release \
            https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 \
            $GCC64_PATH
          echo "::endgroup::"

      - name: Build kernel
        run: |
          export ROOT_DIR=$(pwd)
          export PATH=$ROOT_DIR/$CLANG_PATH/clang-r383902/bin:$ROOT_DIR/$GCC64_PATH/bin:$PATH
          export ARCH=arm64
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export CROSS_COMPILE=aarch64-linux-android-
          cd $KERNEL_PATH

          # Generate .config from our merged defconfig
          mkdir -p out
          cp arch/arm64/configs/$DEFCONFIG_NAME out/.config
          make O=out ARCH=$ARCH CC=$CC \
            CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE \
            olddefconfig

          # Pre-build diagnostic: dump actual values
          echo "=== Pre-build .config values ==="
          for opt in \
            CONFIG_ARCH_QCOM CONFIG_DRM_MSM CONFIG_QCOM_SMEM \
            CONFIG_CRYPTO_DEV_QCOM_ICE CONFIG_QCOM_QMI_HELPERS \
            CONFIG_QPNP_SMB5 CONFIG_USB_DWC3_MSM \
            CONFIG_MSM_BT_POWER CONFIG_MMC_SDHCI_MSM \
            CONFIG_HWSPINLOCK CONFIG_QRTR CONFIG_MFD_SPMI_PMIC \
            CONFIG_BLK_DEV_DM CONFIG_USB_DWC3 CONFIG_MMC \
            CONFIG_MMC_SDHCI CONFIG_MMC_SDHCI_PLTFM CONFIG_DRM \
            CONFIG_CNSS2 CONFIG_CNSS CONFIG_CNSS2_QMI \
            CONFIG_ARCH_KONA; do
            grep -E "^$opt[= ]" out/.config || echo "  $opt: NOT IN .CONFIG"
          done

          # Final config verification before full build
          echo "=== Pre-build config check ==="
          for opt in \
            CONFIG_ARCH_QCOM=y CONFIG_IPC_LOGGING=y CONFIG_PCI_MSM=y \
            CONFIG_MHI_BUS=y CONFIG_MHI_QCOM=y \
            CONFIG_COMPAT=y CONFIG_ARM64_4K_PAGES=y \
            CONFIG_QCOM_SMEM=y \
            CONFIG_CRYPTO_DEV_QCOM_ICE=y CONFIG_QCOM_QMI_HELPERS=y \
            CONFIG_QPNP_SMB5=y CONFIG_USB_DWC3_MSM=y \
            CONFIG_MSM_BT_POWER=y CONFIG_MMC_SDHCI_MSM=y \
            CONFIG_CNSS2=y \
            CONFIG_CNSS2_QMI=y \
            CONFIG_ARCH_KONA=y; do
            name="${opt%=*}"
            if ! grep -q "$opt" out/.config; then
              echo "FATAL: $name is not set (value should be $opt)"
              grep "^$name\|$name is not set" out/.config || echo "(not found at all)"
              exit 1
            fi
          done
          echo "All critical options verified OK."

          echo "=== Starting kernel build ==="
          make -j$(nproc) O=out ARCH=$ARCH CC=$CC \
            CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE

      - name: Set artifact naming
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y%m%d)
          echo "KERNEL_BASE=NyaKernel-apollo-ReSukiSU-SUSFS-${SHORT_HASH}-${BUILD_DATE}" >> "$GITHUB_ENV"

      - name: Package AnyKernel3
        run: |
          echo "::group::Packaging AnyKernel3"
          IMAGE=$KERNEL_PATH/out/arch/arm64/boot/Image
          if [ ! -f "$IMAGE" ]; then
            echo "FATAL: Image not found at $IMAGE"
            exit 1
          fi

          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 anykernel
          cp "$IMAGE" anykernel/
          # Handle dtb — concatenated or individual
          if [ -f "$KERNEL_PATH/out/arch/arm64/boot/dtb" ]; then
            cp "$KERNEL_PATH/out/arch/arm64/boot/dtb" anykernel/dtb
          elif [ -d "$KERNEL_PATH/out/arch/arm64/boot/dts" ]; then
            find "$KERNEL_PATH/out/arch/arm64/boot/dts" -name '*.dtb' -exec cat {} + > anykernel/dtb
          fi
          # Handle dtbo if present
          if [ -f "$KERNEL_PATH/out/arch/arm64/boot/dtbo.img" ]; then
            cp "$KERNEL_PATH/out/arch/arm64/boot/dtbo.img" anykernel/
          fi
          cd anykernel
          sed -i 's/do.devicecheck=1/do.devicecheck=0/' anykernel.sh
          zip -r9 "../${KERNEL_BASE}-AnyKernel3.zip" * -x ".git/*" README.md
          cd ..
          echo "::endgroup::"

      - name: Package boot.img
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/system/tools/mkbootimg \
            mkbootimg-tools
          curl -f -L -o stock-boot.img \
            "https://mirror.math.princeton.edu/pub/lineageos/full/apollon/20260530/boot.img"

          DTB=$KERNEL_PATH/out/arch/arm64/boot/dtb
          [ -f "$DTB" ] || DTB="none"
          python3 scripts/repack_bootimg.py \
            stock-boot.img \
            $KERNEL_PATH/out/arch/arm64/boot/Image \
            "$DTB" \
            "${KERNEL_BASE}-boot.img"

      - name: Upload AnyKernel3 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_BASE }}-AnyKernel3
          path: ${{ env.KERNEL_BASE }}-AnyKernel3.zip

      - name: Upload boot.img artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_BASE }}-bootimg
          path: ${{ env.KERNEL_BASE }}-boot.img

      - name: Generate release body
        id: release-info
        run: |
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          cat > release_body.md << EOF
# NyaKernel for Redmi K30S Ultra (apollo)
## Build Information
- **Build Date**: $(date -u +%Y-%m-%d)
- **Kernel Source**: LineageOS android_kernel_xiaomi_sm8250 (lineage-23.2)
- **Toolchain**: AOSP Clang r383902 + GCC 4.9
- **Features**: ReSukiSU + SUSFS integrated

## Features
- ✅ ReSukiSU (SukiSU-Ultra) root solution
- ✅ SUSFS anti-detection patches
- ✅ Hidden root features for passing SafetyNet/Play Integrity
- ✅ Optimized for SM8250 platform

## Installation
### Via AnyKernel3 (Recommended)
1. Download the AnyKernel3 zip file
2. Flash via TWRP/OrangeFox recovery
3. Reboot system

### Via boot.img
1. Download the boot.img file
2. Boot to fastboot mode
3. Flash: \`fastboot flash boot boot.img\`
4. Reboot: \`fastboot reboot\`

## Post-Installation
1. Install KernelSU Manager app from https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases
2. Enable SUSFS features in KernelSU settings
3. Configure hide rules for banking apps, games, etc.

## Credits
- LineageOS for kernel source
- SukiSU-Ultra team for ReSukiSU
- simonpunk for SUSFS
EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: NyaKernel-${{ github.run_number }}
          name: "NyaKernel (apollo) #${{ github.run_number }} (${{ steps.release-info.outputs.date }})"
          body_path: release_body.md
          files: |
            ${{ env.KERNEL_BASE }}-AnyKernel3.zip
            ${{ env.KERNEL_BASE }}-boot.img
          fail_on_unmatched_files: false
