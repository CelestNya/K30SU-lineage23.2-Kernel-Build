name: Package boot.img from build artifacts

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'Build run number (e.g. 30). Leave empty for latest successful build.'
        required: false
        default: '30'
        type: string

permissions:
  contents: write
  actions: read

jobs:
  package:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Resolve source run ID
        run: |
          if [ -n "${{ inputs.run_number }}" ]; then
            RUN_ID=$(gh run list \
              --workflow build-kernel.yml \
              --status success \
              --json databaseId,number \
              --limit 100 \
              --jq '.[] | select(.number == ${{ inputs.run_number }}) | .databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "FATAL: Run #${{ inputs.run_number }} not found or not successful"
              exit 1
            fi
          else
            RUN_ID=$(gh run list \
              --workflow build-kernel.yml \
              --status success \
              --json databaseId \
              --limit 1 \
              --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "FATAL: No successful build found"
              exit 1
            fi
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_ENV"
          echo "Using run ID: $RUN_ID"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download kernel artifact from build
        uses: actions/download-artifact@v4
        with:
          name: kernel-apollo-stock
          run-id: ${{ env.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract kernel Image and DTB
        run: |
          unzip -o kernel-apollo-stock.zip -d kernel-out
          ls -la kernel-out/
          if [ ! -f kernel-out/Image ]; then
            echo "FATAL: kernel Image not found in artifact"
            exit 1
          fi

      - name: Download stock boot.img
        run: |
          curl -f -L -o stock-boot.img \
            "https://mirror.math.princeton.edu/pub/lineageos/full/apollon/20260530/boot.img"
          echo "stock boot.img: $(ls -lh stock-boot.img | awk '{print $5}')"

      - name: Install mkbootimg
        run: |
          pip install mkbootimg

      - name: Unpack stock boot.img and repack with new kernel
        run: |
          # Unpack stock boot.img — extracts kernel, ramdisk, dtb, boot.img.json
          unpack_bootimg --boot_img stock-boot.img --out boot_extract
          echo "=== Unpacked files ==="
          ls -la boot_extract/

          # Replace kernel and dtb with our built ones
          cp kernel-out/Image boot_extract/kernel
          if [ -f kernel-out/dtb ]; then
            cp kernel-out/dtb boot_extract/dtb
          fi

          # Repack preserving original header params
          mkbootimg --json boot_extract/boot.img.json -o boot.img
          echo "New boot.img: $(ls -lh boot.img | awk '{print $5}')"

      - name: Upload boot.img as artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-apollo-stock-bootimg
          path: boot.img

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bootimg-${{ github.run_number }}
          name: "Stock Kernel boot.img #${{ github.run_number }}"
          body: |
            Stock kernel boot.img for Redmi K30S Ultra (apollo/apolloin).

            - **Source build**: #${{ inputs.run_number || env.run_id }}
            - **Source**: LineageOS/android_kernel_xiaomi_sm8250 @ lineage-23.2
            - **Toolchain**: AOSP Clang r383902 + GCC 4.9
            - **Stock boot.img**: apollon nightly 2026-05-30
            - **Usage**: `fastboot boot boot.img`
          files: boot.img
          fail_on_unmatched_files: false
