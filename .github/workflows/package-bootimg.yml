name: Package boot.img from build artifacts

on:
  workflow_dispatch:
    inputs:
      run_number:
        description: 'Build run number (e.g. 30). Leave empty for latest successful build.'
        required: false
        default: '30'
        type: string

permissions:
  contents: write
  actions: read

jobs:
  package:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Resolve source run ID
        run: |
          if [ -n "${{ inputs.run_number }}" ]; then
            RUN_ID=$(gh run list \
              --workflow build-kernel.yml \
              --status success \
              --json databaseId,number \
              --limit 100 \
              --jq '.[] | select(.number == ${{ inputs.run_number }}) | .databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "FATAL: Run #${{ inputs.run_number }} not found or not successful"
              exit 1
            fi
          else
            RUN_ID=$(gh run list \
              --workflow build-kernel.yml \
              --status success \
              --json databaseId \
              --limit 1 \
              --jq '.[0].databaseId')
            if [ -z "$RUN_ID" ]; then
              echo "FATAL: No successful build found"
              exit 1
            fi
          fi
          echo "run_id=$RUN_ID" >> "$GITHUB_ENV"
          echo "Using run ID: $RUN_ID"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set artifact naming
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y%m%d)
          echo "KERNEL_BASE=NyaKernel-apollo-stock-${SHORT_HASH}-${BUILD_DATE}" >> "$GITHUB_ENV"

      - name: Download kernel artifact from build
        uses: actions/download-artifact@v4
        with:
          name: kernel-apollo-stock
          run-id: ${{ env.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract kernel Image and DTB
        run: |
          unzip -o kernel-apollo-stock.zip -d kernel-out
          ls -la kernel-out/
          if [ ! -f kernel-out/Image ]; then
            echo "FATAL: kernel Image not found in artifact"
            exit 1
          fi

      - name: Download stock boot.img
        run: |
          curl -f -L -o stock-boot.img \
            "https://mirror.math.princeton.edu/pub/lineageos/full/apollon/20260530/boot.img"
          echo "stock boot.img: $(ls -lh stock-boot.img | awk '{print $5}')"

      - name: Install mkbootimg (AOSP)
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/platform/system/tools/mkbootimg \
            mkbootimg-tools
          echo "mkbootimg installed"

      - name: Repack boot.img
        run: |
          python3 scripts/repack_bootimg.py \
            stock-boot.img \
            kernel-out/Image \
            kernel-out/dtb \
            "${KERNEL_BASE}-boot.img"
          echo "New boot.img: $(ls -lh ${KERNEL_BASE}-boot.img | awk '{print $5}')"

      - name: Upload boot.img as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.KERNEL_BASE }}-bootimg
          path: ${{ env.KERNEL_BASE }}-boot.img

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: bootimg-${{ github.run_number }}
          name: "NyaKernel boot.img #${{ github.run_number }}"
          body: |
            NyaKernel boot.img for Redmi K30S Ultra (apollo/apolloin).

            - **Source build**: #${{ inputs.run_number || env.run_id }}
            - **Source**: LineageOS/android_kernel_xiaomi_sm8250 @ lineage-23.2
            - **Toolchain**: AOSP Clang r383902 + GCC 4.9
            - **Stock boot.img**: apollon nightly 2026-05-30
            - **Usage**: `fastboot boot boot.img`
          files: ${{ env.KERNEL_BASE }}-boot.img
          fail_on_unmatched_files: false
